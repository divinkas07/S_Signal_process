<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calming Starfield</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #0a0a1a;
            cursor: none;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }

        .hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.3);
            font-family: 'Georgia', serif;
            font-size: 14px;
            letter-spacing: 2px;
            pointer-events: none;
            transition: opacity 2s ease;
        }

        .hint.fade {
            opacity: 0;
        }
    </style>
</head>
<body>
    <canvas id="starfield"></canvas>
    <div class="hint">move your cursor to guide the stars</div>

    <script>
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        const hint = document.querySelector('.hint');

        let width, height;
        let stars = [];
        let mouse = { x: 0, y: 0, targetX: 0, targetY: 0 };
        let mouseActive = false;

        const config = {
            starCount: 400,
            layers: 5,
            baseSpeed: 0.3,
            mouseInfluence: 0.08,
            colors: [
                'rgba(255, 255, 255, 0.9)',
                'rgba(200, 220, 255, 0.8)',
                'rgba(180, 200, 255, 0.7)',
                'rgba(150, 180, 255, 0.6)',
                'rgba(255, 240, 220, 0.8)'
            ]
        };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function createStar(layer) {
            const layerDepth = layer / config.layers;
            return {
                x: Math.random() * width,
                y: Math.random() * height,
                size: Math.random() * 2 + 0.5 + layerDepth * 1.5,
                baseX: 0,
                baseY: 0,
                layer: layer,
                depth: layerDepth,
                speed: config.baseSpeed * (0.5 + layerDepth * 1.5),
                color: config.colors[layer % config.colors.length],
                twinkleSpeed: Math.random() * 0.02 + 0.01,
                twinklePhase: Math.random() * Math.PI * 2,
                pulse: Math.random() * Math.PI * 2
            };
        }

        function init() {
            resize();
            stars = [];
            
            for (let layer = 0; layer < config.layers; layer++) {
                const starsInLayer = Math.floor(config.starCount / config.layers);
                for (let i = 0; i < starsInLayer; i++) {
                    const star = createStar(layer);
                    star.baseX = star.x;
                    star.baseY = star.y;
                    stars.push(star);
                }
            }

            mouse.x = width / 2;
            mouse.y = height / 2;
            mouse.targetX = width / 2;
            mouse.targetY = height / 2;
        }

        function updateStar(star) {
            star.pulse += star.twinkleSpeed;
            
            const twinkle = 0.5 + 0.5 * Math.sin(star.pulse);
            const size = star.size * (0.7 + 0.3 * twinkle);
            
            const dx = mouse.x - width / 2;
            const dy = mouse.y - height / 2;
            
            const influence = star.depth * config.mouseInfluence;
            const offsetX = -dx * influence * star.speed;
            const offsetY = -dy * influence * star.speed;
            
            star.x = star.baseX + offsetX;
            star.y = star.baseY + offsetY;
            
            star.currentSize = size;
            
            if (star.x < -50) star.x = width + 50;
            if (star.x > width + 50) star.x = -50;
            if (star.y < -50) star.y = height + 50;
            if (star.y > height + 50) star.y = -50;
        }

        function drawStar(star) {
            const alpha = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(star.pulse));
            
            ctx.beginPath();
            
            const gradient = ctx.createRadialGradient(
                star.x, star.y, 0,
                star.x, star.y, star.currentSize * 2
            );
            
            const colorWithAlpha = star.color.replace(/[\d.]+\)$/, `${alpha})`);
            const glowAlpha = alpha * 0.3;
            const glowColor = star.color.replace(/[\d.]+\)$/, `${glowAlpha})`);
            
            gradient.addColorStop(0, colorWithAlpha);
            gradient.addColorStop(0.5, glowColor);
            gradient.addColorStop(1, 'transparent');
            
            ctx.fillStyle = gradient;
            ctx.arc(star.x, star.y, star.currentSize * 2, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.beginPath();
            ctx.fillStyle = colorWithAlpha;
            ctx.arc(star.x, star.y, star.currentSize * 0.5, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawConnectionLines() {
            const maxDistance = 150;
            const mouseDx = mouse.x - width / 2;
            const mouseDy = mouse.y - height / 2;
            
            stars.forEach((star, i) => {
                const dx = mouseDx * star.depth;
                const dy = mouseDy * star.depth;
                const starScreenX = star.x;
                const starScreenY = star.y;
                
                const distToMouse = Math.sqrt(
                    Math.pow(starScreenX - mouse.x, 2) + 
                    Math.pow(starScreenY - mouse.y, 2)
                );
                
                if (distToMouse < maxDistance) {
                    const alpha = (1 - distToMouse / maxDistance) * 0.15 * star.depth;
                    ctx.beginPath();
                    ctx.strokeStyle = `rgba(150, 180, 255, ${alpha})`;
                    ctx.lineWidth = 0.5;
                    ctx.moveTo(starScreenX, starScreenY);
                    ctx.lineTo(mouse.x, mouse.y);
                    ctx.stroke();
                }
                
                for (let j = i + 1; j < stars.length; j++) {
                    const other = stars[j];
                    if (Math.abs(star.layer - other.layer) > 1) continue;
                    
                    const dist = Math.sqrt(
                        Math.pow(starScreenX - other.x, 2) + 
                        Math.pow(starScreenY - other.y, 2)
                    );
                    
                    if (dist < 80 && dist > 0) {
                        const alpha = (1 - dist / 80) * 0.08 * star.depth;
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(200, 220, 255, ${alpha})`;
                        ctx.lineWidth = 0.3;
                        ctx.moveTo(starScreenX, starScreenY);
                        ctx.lineTo(other.x, other.y);
                        ctx.stroke();
                    }
                }
            });
        }

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 26, 0.15)';
            ctx.fillRect(0, 0, width, height);
            
            mouse.x += (mouse.targetX - mouse.x) * 0.05;
            mouse.y += (mouse.targetY - mouse.y) * 0.05;
            
            stars.forEach(updateStar);
            
            drawConnectionLines();
            
            stars.sort((a, b) => a.depth - b.depth);
            stars.forEach(drawStar);
            
            requestAnimationFrame(animate);
        }

        function handleMouseMove(e) {
            mouse.targetX = e.clientX;
            mouse.targetY = e.clientY;
            
            if (!mouseActive) {
                mouseActive = true;
                hint.classList.add('fade');
            }
        }

        function handleTouchMove(e) {
            e.preventDefault();
            const touch = e.touches[0];
            mouse.targetX = touch.clientX;
            mouse.targetY = touch.clientY;
            
            if (!mouseActive) {
                mouseActive = true;
                hint.classList.add('fade');
            }
        }

        window.addEventListener('resize', () => {
            resize();
            init();
        });

        canvas.addEventListener('mousemove', handleMouseMove);
        canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
        canvas.addEventListener('touchstart', handleTouchMove, { passive: false });

        init();
        animate();

        // Subtle automatic mouse movement when idle
        let idleTime = 0;
        setInterval(() => {
            if (mouseActive) {
                idleTime++;
                if (idleTime > 300) { // After 5 seconds of no movement
                    const time = Date.now() * 0.0005;
                    mouse.targetX = width / 2 + Math.sin(time) * 100;
                    mouse.targetY = height / 2 + Math.cos(time * 0.7) * 60;
                }
            }
        }, 100);

        document.addEventListener('mousemove', () => {
            idleTime = 0;
        });
    </script>
</body>
</html>
